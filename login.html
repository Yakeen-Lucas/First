<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LOGIN // SYSTEM ACCESS</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green: #00ff88;
      --green-dim: #00b860;
      --green-glow: rgba(0, 255, 136, 0.18);
      --red: #ff4466;
      --bg: #070b0f;
      --panel: #0d1117;
      --border: #1a2a1a;
    }

    body {
      background: var(--bg);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridMove 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridMove {
      0%   { transform: translateY(0); }
      100% { transform: translateY(40px); }
    }

    /* Scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.07) 2px,
        rgba(0,0,0,0.07) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    .terminal {
      width: 480px;
      background: var(--panel);
      border: 1px solid var(--green-dim);
      box-shadow:
        0 0 0 1px rgba(0,255,136,0.05),
        0 0 40px rgba(0,255,136,0.08),
        0 0 80px rgba(0,255,136,0.04),
        inset 0 0 40px rgba(0,0,0,0.5);
      position: relative;
      animation: terminalIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }

    @keyframes terminalIn {
      from { opacity: 0; transform: translateY(24px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Title bar */
    .titlebar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,255,136,0.03);
    }

    .dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .dot-r { background: #ff5f57; box-shadow: 0 0 6px #ff5f57; }
    .dot-y { background: #febc2e; box-shadow: 0 0 6px #febc2e; }
    .dot-g { background: #28c840; box-shadow: 0 0 6px #28c840; }

    .titlebar-text {
      flex: 1;
      text-align: center;
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* Body */
    .body {
      padding: 32px 36px 36px;
    }

    .header {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-size: 28px;
      font-weight: 900;
      letter-spacing: 6px;
      color: var(--green);
      text-shadow: 0 0 20px rgba(0,255,136,0.5);
      animation: glitch 4s infinite;
      display: block;
      margin-bottom: 6px;
    }

    @keyframes glitch {
      0%, 90%, 100% { text-shadow: 0 0 20px rgba(0,255,136,0.5); transform: none; }
      92%  { text-shadow: -2px 0 var(--red), 2px 0 #00ffff; transform: skewX(-1deg); }
      94%  { text-shadow: 2px 0 var(--red), -2px 0 #00ffff; transform: skewX(1deg); }
      96%  { text-shadow: 0 0 20px rgba(0,255,136,0.5); transform: none; }
    }

    .sub {
      font-size: 11px;
      color: var(--green-dim);
      letter-spacing: 4px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
      color: var(--border);
      font-size: 11px;
      color: rgba(0,255,136,0.25);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Boot text */
    .boot-text {
      font-size: 11px;
      color: rgba(0,255,136,0.4);
      margin-bottom: 24px;
      line-height: 1.7;
    }
    .boot-text span { color: var(--green-dim); }

    /* Form fields */
    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 3px;
      color: var(--green-dim);
      margin-bottom: 7px;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      background: rgba(0,255,136,0.04);
      border: 1px solid rgba(0,255,136,0.2);
      color: var(--green);
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      caret-color: var(--green);
    }

    input[type="text"]:focus,
    input[type="password"]:focus {
      border-color: var(--green);
      background: rgba(0,255,136,0.07);
      box-shadow: 0 0 0 3px rgba(0,255,136,0.08), inset 0 0 10px rgba(0,255,136,0.03);
    }

    input::placeholder { color: rgba(0,255,136,0.2); }

    /* Error */
    .error-box {
      background: rgba(255,68,102,0.08);
      border: 1px solid rgba(255,68,102,0.35);
      color: var(--red);
      font-size: 12px;
      padding: 10px 14px;
      margin-bottom: 18px;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .error-box::before { content: '✗'; font-size: 14px; }

    /* Submit */
    button[type="submit"] {
      width: 100%;
      background: transparent;
      border: 1px solid var(--green);
      color: var(--green);
      font-family: 'Orbitron', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 5px;
      padding: 14px;
      cursor: pointer;
      text-transform: uppercase;
      position: relative;
      overflow: hidden;
      transition: color 0.25s, box-shadow 0.25s;
      margin-top: 8px;
    }

    button[type="submit"]::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--green);
      transform: translateX(-101%);
      transition: transform 0.25s cubic-bezier(0.16,1,0.3,1);
    }

    button[type="submit"]:hover {
      color: var(--bg);
      box-shadow: 0 0 20px rgba(0,255,136,0.3);
    }

    button[type="submit"]:hover::before { transform: translateX(0); }

    button[type="submit"] span { position: relative; z-index: 1; }

    /* Blink cursor */
    .cursor {
      display: inline-block;
      width: 8px; height: 14px;
      background: var(--green);
      vertical-align: middle;
      animation: blink 1s step-end infinite;
      margin-left: 2px;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* Footer */
    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
      font-size: 10px;
      color: rgba(0,255,136,0.2);
      display: flex;
      justify-content: space-between;
      letter-spacing: 1px;
    }

    /* Corner decorations */
    .corner {
      position: absolute;
      width: 12px; height: 12px;
    }
    .corner::before, .corner::after {
      content: '';
      position: absolute;
      background: var(--green);
    }
    .corner::before { width: 100%; height: 1px; top: 0; left: 0; }
    .corner::after  { width: 1px; height: 100%; top: 0; left: 0; }
    .corner.tl { top: -1px; left: -1px; }
    .corner.tr { top: -1px; right: -1px; transform: scaleX(-1); }
    .corner.bl { bottom: -1px; left: -1px; transform: scaleY(-1); }
    .corner.br { bottom: -1px; right: -1px; transform: scale(-1); }
  </style>
</head>
<body>

  <div class="terminal">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <div class="titlebar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <span class="titlebar-text">secure shell — v2.4.1</span>
    </div>

    <div class="body">
      <div class="header">
        <span class="logo">NEXUS</span>
        <span class="sub">AUTHENTICATION REQUIRED</span>
      </div>

      <div class="divider">// INIT //</div>

      <div class="boot-text">
        > System ready<br>
        > Encryption: <span>AES-256</span><br>
        > Session: <span>ANONYMOUS</span><span class="cursor"></span>
      </div>

      <!-- Flask injects error here via Jinja2 -->
      {% if error %}
      <div class="error-box">{{ error }}</div>
      {% endif %}

      <form action="/login" method="POST">
        <div class="field">
          <label>// USER IDENTIFIER</label>
          <input type="text" name="username" placeholder="enter username" autocomplete="off" required />
        </div>

        <div class="field">
          <label>// ACCESS KEY</label>
          <input type="password" name="password" placeholder="••••••••••••" required />
        </div>

        <button type="submit"><span>AUTHENTICATE →</span></button>
      </form>

      <div class="footer">
        <span>NEXUS CORP © 2099</span>
        <span>NODE: ZA-CPT-01</span>
      </div>
    </div>
  </div>

</body>
</html>
